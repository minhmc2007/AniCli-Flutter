name: API Sanity Check

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight to check for broken APIs

jobs:
  api_test:
    name: Test Manga & Anime APIs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run API Verification Script
        run: python test_api.py

      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: api_test.log
          retention-days: 5
