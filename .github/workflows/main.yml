name: Build Application

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # --- WINDOWS BUILD ---
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop
    - name: Get Dependencies
      run: flutter pub get
    - name: Build Windows
      run: flutter build windows --release
    
    - name: Package - Windows (NSIS installer & Portable)
      shell: powershell
      run: |
        $appName = "AniCli Flutter"
        $prefix = "anicli"
        
        # Extract Version from lib/main.dart
        $mainDart = Get-Content "lib\main.dart" -Raw
        if ($mainDart -match 'const\s+String\s+kAppVersion\s*=\s*"([^"]+)"') {
            $version = $matches[1]
        } else {
            Write-Host "Warning: Could not parse version from main.dart. Defaulting to 1.0.0"
            $version = "1.0.0" 
        }
        Write-Host "Detected Version: $version"

        $exeName = (Get-ChildItem "build\windows\x64\runner\Release\*.exe" |
                    Select-Object -First 1).Name
        Write-Host "Detected exe: $exeName"

        # 1. Create Portable ZIP
        Write-Host "Creating Portable Zip..."
        Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "$prefix-windows-portable.zip"

        # Locate or Fetch GPL-3.0 License
        if (Test-Path "LICENSE") {
            $licenseFile = "LICENSE"
        } elseif (Test-Path "LICENSE.txt") {
            $licenseFile = "LICENSE.txt"
        } else {
            Write-Host "No LICENSE file found in repo, downloading GPL-3.0..."
            Invoke-WebRequest -Uri "https://www.gnu.org/licenses/gpl-3.0.txt" -OutFile "GPL3_LICENSE.txt"
            $licenseFile = "GPL3_LICENSE.txt"
        }

        # 2. Create Installer Setup.exe
        Write-Host "Creating Installer Executable..."
        $nsi = @"
        Unicode true
        !include "MUI2.nsh"

        Name              "$appName $version"
        OutFile           "$prefix-windows-setup.exe"
        InstallDir        "`$PROGRAMFILES64\$appName"
        InstallDirRegKey  HKLM "Software\$appName" "InstallDir"
        RequestExecutionLevel admin
        SetCompressor     /SOLID lzma

        !define MUI_ABORTWARNING
        !define MUI_ICON "windows\runner\resources\app_icon.ico"

        !insertmacro MUI_PAGE_WELCOME
        !insertmacro MUI_PAGE_LICENSE "$licenseFile"
        !insertmacro MUI_PAGE_DIRECTORY
        !insertmacro MUI_PAGE_INSTFILES
        !define MUI_FINISHPAGE_RUN      "`$INSTDIR\$exeName"
        !define MUI_FINISHPAGE_RUN_TEXT "Launch $appName"
        !insertmacro MUI_PAGE_FINISH

        !insertmacro MUI_UNPAGE_CONFIRM
        !insertmacro MUI_UNPAGE_INSTFILES

        !insertmacro MUI_LANGUAGE "English"

        Section "$appName" SecMain
          SectionIn RO
          SetOutPath "`$INSTDIR"
          File /r "build\windows\x64\runner\Release\*"

          CreateShortcut "`$DESKTOP\$appName.lnk" "`$INSTDIR\$exeName"
          CreateDirectory "`$SMPROGRAMS\$appName"
          CreateShortcut  "`$SMPROGRAMS\$appName\$appName.lnk"            "`$INSTDIR\$exeName"
          CreateShortcut  "`$SMPROGRAMS\$appName\Uninstall $appName.lnk" "`$INSTDIR\Uninstall.exe"

          WriteUninstaller "`$INSTDIR\Uninstall.exe"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "DisplayName"     "$appName $version"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "UninstallString" "`$INSTDIR\Uninstall.exe"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "DisplayIcon"     "`$INSTDIR\$exeName"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "Publisher"       "Minhmc2007"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "DisplayVersion"  "$version"
          WriteRegStr   HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "Comments"        "The Cozy Anime & Manga Client. A beautiful, animated Flutter Anime Client."
          WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "NoModify"        1
          WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName" "NoRepair"        1
        SectionEnd

        Section "Uninstall"
          Delete "`$DESKTOP\$appName.lnk"
          Delete "`$SMPROGRAMS\$appName\$appName.lnk"
          Delete "`$SMPROGRAMS\$appName\Uninstall $appName.lnk"
          RMDir  "`$SMPROGRAMS\$appName"
          RMDir /r "`$INSTDIR"
          DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\$appName"
          DeleteRegKey HKLM "Software\$appName"
        SectionEnd
        "@

        # Check for Flutter's default Windows icon path first
        $icoPath = "windows\runner\resources\app_icon.ico"
        if (-not (Test-Path $icoPath)) {
          Write-Host "No app_icon.ico found - falling back to NSIS default icon"
          $nsi = $nsi -replace '(?m)^.*!define MUI_ICON.*$\r?\n', ''
        }

        $nsi | Set-Content -Encoding UTF8 "installer.nsi"
        
        $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
        if (-not (Test-Path $makensis)) {
            $makensis = "makensis.exe"
        }
        & $makensis /V3 installer.nsi

        if (-not (Test-Path "$prefix-windows-setup.exe")) {
          throw "NSIS did not produce the installer exe."
        }

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Builds
        path: |
          anicli-windows-portable.zip
          anicli-windows-setup.exe

  # --- LINUX BUILD ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libasound2-dev libmpv-dev mpv
      - name: Get Dependencies
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release

      - name: Package - Linux (Tarball & AppImage)
        shell: bash
        run: |
          PREFIX="anicli"
          APP_NAME="AniCli Flutter"
          BUNDLE="build/linux/x64/release/bundle"
          APPDIR="${APP_NAME}.AppDir"

          # Extract Version from lib/main.dart
          VERSION=$(grep -oP 'const String kAppVersion = "\K[^"]+' lib/main.dart || echo "1.0.0")
          echo "Detected Version: $VERSION"

          # 1. Compress Portable Tarball
          echo "Compressing Portable Tarball..."
          tar -czf ${PREFIX}-linux-portable.tar.gz -C ${BUNDLE} .

          # 2. Package AppImage
          echo "Building AppImage..."
          BINARY_PATH=$(find "${BUNDLE}" -maxdepth 1 -type f -executable | head -1)
          BINARY_NAME=$(basename "${BINARY_PATH}")
          echo "Detected binary: ${BINARY_NAME}"

          mkdir -p "${APPDIR}"
          cp "${BINARY_PATH}"       "${APPDIR}/"
          cp -r "${BUNDLE}/lib"     "${APPDIR}/" 2>/dev/null || true
          cp -r "${BUNDLE}/data"    "${APPDIR}/" 2>/dev/null || true

          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/BINARY_PLACEHOLDER" "$@"
          APPRUN
          sed -i "s|BINARY_PLACEHOLDER|${BINARY_NAME}|g" "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun"

          cat > "${APPDIR}/${PREFIX}.desktop" << EOF
          [Desktop Entry]
          Name=${APP_NAME}
          Comment=The Cozy Anime & Manga Client. A beautiful, animated Flutter Anime Client.
          Exec=${BINARY_NAME}
          Icon=${PREFIX}
          Type=Application
          Categories=AudioVideo;
          EOF

          # Dynamically look for icon, fallback to base64 generic pixel
          if [ -f "assets/icon.png" ]; then
            cp "assets/icon.png" "${APPDIR}/${PREFIX}.png"
          else
            ICON=$(find assets linux -maxdepth 3 -name "*.png" 2>/dev/null | head -1)
            if [ -n "${ICON}" ]; then
              cp "${ICON}" "${APPDIR}/${PREFIX}.png"
            else
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPj/HwADBgEB1gVHGQAAAABJRU5ErkJggg==" \
                | base64 -d > "${APPDIR}/${PREFIX}.png"
            fi
          fi

          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool "${APPDIR}" "${PREFIX}-linux-x64.AppImage"

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Builds
          path: |
            anicli-linux-portable.tar.gz
            anicli-linux-x64.AppImage

  # --- ANDROID BUILD ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Get Dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  # --- MACOS BUILD ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Enable MacOS Desktop
        run: flutter config --enable-macos-desktop
      - name: Get Dependencies
        run: flutter pub get
      - name: Build MacOS
        run: flutter build macos --release
      # Create a simple DMG-like zip structure
      - name: Compress MacOS Build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../anicli-macos.zip "AniCli Flutter.app"
      - name: Upload MacOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-Build
          path: anicli-macos.zip

  # --- IOS BUILD (Unsigned) ---
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Get Dependencies
        run: flutter pub get

      # We build with --no-codesign because we don't have Apple Certs in CI
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      # Manually create the .ipa structure so it can be sideloaded later
      - name: Pack IPA
        run: |
          mkdir Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r anicli-unsigned.ipa Payload

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA-Unsigned
          path: anicli-unsigned.ipa
