name: animeclient
description: A cozy anime client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  file_picker: ^11.0.2
  # Networking
  http: ^1.2.0

  # State Management
  provider: ^6.1.1

  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.3
  lucide_icons_flutter: ^3.1.14+2
  glass_kit: ^4.0.2
  url_launcher: ^6.2.0
  media_kit: ^1.1.10
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.4 # Contains the MPV binaries
  flutter_markdown_plus: ^1.0.7

  # Permissions (for Android/iOS)
  permission_handler: ^12.0.1
  path_provider: ^2.1.1
  open_file: ^4.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  flutter_inappwebview: ^6.1.0
dependency_overrides:
  media_kit:
    git:
      url: https://github.com/minhmc2007/media-kit.git
      ref: v1.2.7
      path: media_kit
  media_kit_libs_video:
    git:
      url: https://github.com/minhmc2007/media-kit.git
      ref: v1.2.7
      path: libs/universal/media_kit_libs_video
  media_kit_libs_windows_video:
    git:
      url: https://github.com/minhmc2007/media-kit.git
      ref: v1.2.7
      path: libs/windows/media_kit_libs_windows_video
  media_kit_libs_android_video:
    git:
      url: https://github.com/minhmc2007/media-kit.git
      ref: v1.2.7
      path: libs/android/media_kit_libs_android_video

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

